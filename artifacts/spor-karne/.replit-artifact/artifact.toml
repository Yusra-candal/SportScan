kind = "web"
previewPath = "/"
title = "Spor Karne"
version = "1.0.0"
id = "artifacts/spor-karne"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22007

[[services]]
name = "jump-analyzer"
paths = [ "/video-api" ]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/spor-karne run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spor-karne", "run", "build" ]
publicDir = "artifacts/spor-karne/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22007"
BASE_PATH = "/"
